name: CI - Worker

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build, test and Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Esperanca.Worker.sln

      - name: Build solution
        run: dotnet build Esperanca.Worker.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Esperanca.Worker.sln --configuration Release --no-build --verbosity normal

      - name: Build Docker image
        run: docker build -t esperanca-worker:ci .