services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: fzndev/fiap-ong-esperanca-worker:latest
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__MongoDb: mongodb://mongo:27017
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__User: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      RabbitMq__Exchange: esperanca.doacoes
      RabbitMq__DeadLetterExchange: esperanca.doacoes.dlx
      RabbitMq__RecebidaQueue: doacoes-recebidas
      RabbitMq__RecebidaRoutingKey: recebida
      RabbitMq__RecebidaDeadLetterQueue: doacoes-recebidas-dlq
      RabbitMq__PrefetchCount: 1
    restart: unless-stopped